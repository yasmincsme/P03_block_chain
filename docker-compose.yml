# PRÉ-REQUISITO: executar  python3 blockchain/geth/genkeys.py  uma vez para
# gerar o arquivo .env com todas as chaves e endereços da rede privada.
#
# Ordem de subida recomendada (tudo local):
#
#   docker compose up -d broker_1 broker_2 broker_3 broker_4
#   docker compose up -d geth_setor_1 geth_setor_2 geth_setor_3 geth_setor_4
#   docker compose up blockchain_deployer          # implanta o contrato (1x)
#   docker compose up -d sector_manager_1 sector_manager_2 \
#                        sector_manager_3 sector_manager_4
#   docker compose up -d drone_a drone_b drone_c drone_d \
#                        drone_e drone_f drone_g drone_h
#   docker compose run --rm -it empresa_a          # terminal empresa A
#   docker compose run --rm -it empresa_b          # terminal empresa B
#   docker compose run --rm -it monitor

services:

  # ===========================================================================
  # BROKERS MQTT
  # ===========================================================================

  broker_1:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_1
    ports:
      - "3001:3001/tcp"
      - "3001:3001/udp"
    environment:
      BROKER_PORT: "3001"
    restart: unless-stopped

  broker_2:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_2
    ports:
      - "3002:3002/tcp"
      - "3002:3002/udp"
    environment:
      BROKER_PORT: "3002"
    restart: unless-stopped

  broker_3:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_3
    ports:
      - "3003:3003/tcp"
      - "3003:3003/udp"
    environment:
      BROKER_PORT: "3003"
    restart: unless-stopped

  broker_4:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_4
    ports:
      - "3004:3004/tcp"
      - "3004:3004/udp"
    environment:
      BROKER_PORT: "3004"
    restart: unless-stopped

  # ===========================================================================
  # NÓS GETH — rede Clique PoA privada (4 sealers)
  # ===========================================================================

  geth_setor_1:
    build: ./blockchain/geth
    container_name: geth_setor_1
    environment:
      SEALER_ADDR: "${SEALER_1_ADDR}"
      SEALER_KEY:  "${SEALER_1_KEY}"
      NODE_KEY:    "${SEALER_1_NODE_KEY}"
      PEERS:       "enode://${ENODE_2}@${IP_SETOR_2}:30303,enode://${ENODE_3}@${IP_SETOR_3}:30303,enode://${ENODE_4}@${IP_SETOR_4}:30303"
      NETWORK_ID:  "1337"
    ports:
      - "18541:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - geth_setor_1_data:/data
    restart: unless-stopped

  geth_setor_2:
    build: ./blockchain/geth
    container_name: geth_setor_2
    environment:
      SEALER_ADDR: "${SEALER_2_ADDR}"
      SEALER_KEY:  "${SEALER_2_KEY}"
      NODE_KEY:    "${SEALER_2_NODE_KEY}"
      PEERS:       "enode://${ENODE_1}@${IP_SETOR_1}:30303,enode://${ENODE_3}@${IP_SETOR_3}:30303,enode://${ENODE_4}@${IP_SETOR_4}:30303"
      NETWORK_ID:  "1337"
    ports:
      - "18542:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - geth_setor_2_data:/data
    restart: unless-stopped

  geth_setor_3:
    build: ./blockchain/geth
    container_name: geth_setor_3
    environment:
      SEALER_ADDR: "${SEALER_3_ADDR}"
      SEALER_KEY:  "${SEALER_3_KEY}"
      NODE_KEY:    "${SEALER_3_NODE_KEY}"
      PEERS:       "enode://${ENODE_1}@${IP_SETOR_1}:30303,enode://${ENODE_2}@${IP_SETOR_2}:30303,enode://${ENODE_4}@${IP_SETOR_4}:30303"
      NETWORK_ID:  "1337"
    ports:
      - "18543:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - geth_setor_3_data:/data
    restart: unless-stopped

  geth_setor_4:
    build: ./blockchain/geth
    container_name: geth_setor_4
    environment:
      SEALER_ADDR: "${SEALER_4_ADDR}"
      SEALER_KEY:  "${SEALER_4_KEY}"
      NODE_KEY:    "${SEALER_4_NODE_KEY}"
      PEERS:       "enode://${ENODE_1}@${IP_SETOR_1}:30303,enode://${ENODE_2}@${IP_SETOR_2}:30303,enode://${ENODE_3}@${IP_SETOR_3}:30303"
      NETWORK_ID:  "1337"
    ports:
      - "18544:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - geth_setor_4_data:/data
    restart: unless-stopped

  # ===========================================================================
  # DEPLOYER DO CONTRATO (roda uma vez, depois pode ser removido)
  # ===========================================================================

  blockchain_deployer:
    build: ./blockchain
    container_name: blockchain_deployer
    environment:
      GETH_URL:       "http://${IP_SETOR_1}:18541"
      DEPLOY_ADDR:    "${DEPLOYER_ADDR}"
      DEPLOY_KEY:     "${DEPLOYER_KEY}"
      COMPANY_A_ADDR: "${EMPRESA_A_ADDR}"
      COMPANY_B_ADDR: "${EMPRESA_B_ADDR}"
    restart: "no"

  # ===========================================================================
  # GERENCIADORES DE SETOR
  # ===========================================================================

  sector_manager_1:
    build: ./sector_manager
    container_name: setor_1_manager
    ports:
      - "5011:5001"
    environment:
      SECTOR_ID:         "1"
      LOCAL_BROKER:      "broker_setor_1"
      BROKER_PORT:       "3001"
      RA_PORT:           "5001"
      PEERS:             "${IP_SETOR_2}:5012,${IP_SETOR_3}:5013,${IP_SETOR_4}:5014"
      DRONES:            "drone_a:broker_setor_1:3001,drone_b:broker_setor_1:3001,drone_c:${IP_SETOR_2}:3002,drone_d:${IP_SETOR_2}:3002,drone_e:${IP_SETOR_3}:3003,drone_f:${IP_SETOR_3}:3003,drone_g:${IP_SETOR_4}:3004,drone_h:${IP_SETOR_4}:3004"
      ALL_BROKERS:       "broker_setor_1:3001,${IP_SETOR_2}:3002,${IP_SETOR_3}:3003,${IP_SETOR_4}:3004"
      REPLY_TIMEOUT:     "6.0"
      MISSION_MIN:       "20"
      MISSION_MAX:       "60"
      GETH_URL:          "http://geth_setor_1:8545"
      SETOR_WALLET_ADDR: "${SEALER_1_ADDR}"
      SETOR_WALLET_KEY:  "${SEALER_1_KEY}"
      CONTRACT_ADDR:     "${CONTRACT_ADDR}"
    depends_on:
      - broker_1
      - geth_setor_1
    restart: unless-stopped

  sector_manager_2:
    build: ./sector_manager
    container_name: setor_2_manager
    ports:
      - "5012:5001"
    environment:
      SECTOR_ID:         "2"
      LOCAL_BROKER:      "broker_setor_2"
      BROKER_PORT:       "3002"
      RA_PORT:           "5001"
      PEERS:             "${IP_SETOR_1}:5011,${IP_SETOR_3}:5013,${IP_SETOR_4}:5014"
      DRONES:            "drone_a:${IP_SETOR_1}:3001,drone_b:${IP_SETOR_1}:3001,drone_c:broker_setor_2:3002,drone_d:broker_setor_2:3002,drone_e:${IP_SETOR_3}:3003,drone_f:${IP_SETOR_3}:3003,drone_g:${IP_SETOR_4}:3004,drone_h:${IP_SETOR_4}:3004"
      ALL_BROKERS:       "${IP_SETOR_1}:3001,broker_setor_2:3002,${IP_SETOR_3}:3003,${IP_SETOR_4}:3004"
      REPLY_TIMEOUT:     "6.0"
      MISSION_MIN:       "20"
      MISSION_MAX:       "60"
      GETH_URL:          "http://geth_setor_2:8545"
      SETOR_WALLET_ADDR: "${SEALER_2_ADDR}"
      SETOR_WALLET_KEY:  "${SEALER_2_KEY}"
      CONTRACT_ADDR:     "${CONTRACT_ADDR}"
    depends_on:
      - broker_2
      - geth_setor_2
    restart: unless-stopped

  sector_manager_3:
    build: ./sector_manager
    container_name: setor_3_manager
    ports:
      - "5013:5001"
    environment:
      SECTOR_ID:         "3"
      LOCAL_BROKER:      "broker_setor_3"
      BROKER_PORT:       "3003"
      RA_PORT:           "5001"
      PEERS:             "${IP_SETOR_1}:5011,${IP_SETOR_2}:5012,${IP_SETOR_4}:5014"
      DRONES:            "drone_a:${IP_SETOR_1}:3001,drone_b:${IP_SETOR_1}:3001,drone_c:${IP_SETOR_2}:3002,drone_d:${IP_SETOR_2}:3002,drone_e:broker_setor_3:3003,drone_f:broker_setor_3:3003,drone_g:${IP_SETOR_4}:3004,drone_h:${IP_SETOR_4}:3004"
      ALL_BROKERS:       "${IP_SETOR_1}:3001,${IP_SETOR_2}:3002,broker_setor_3:3003,${IP_SETOR_4}:3004"
      REPLY_TIMEOUT:     "6.0"
      MISSION_MIN:       "20"
      MISSION_MAX:       "60"
      GETH_URL:          "http://geth_setor_3:8545"
      SETOR_WALLET_ADDR: "${SEALER_3_ADDR}"
      SETOR_WALLET_KEY:  "${SEALER_3_KEY}"
      CONTRACT_ADDR:     "${CONTRACT_ADDR}"
    depends_on:
      - broker_3
      - geth_setor_3
    restart: unless-stopped

  sector_manager_4:
    build: ./sector_manager
    container_name: setor_4_manager
    ports:
      - "5014:5001"
    environment:
      SECTOR_ID:         "4"
      LOCAL_BROKER:      "broker_setor_4"
      BROKER_PORT:       "3004"
      RA_PORT:           "5001"
      PEERS:             "${IP_SETOR_1}:5011,${IP_SETOR_2}:5012,${IP_SETOR_3}:5013"
      DRONES:            "drone_a:${IP_SETOR_1}:3001,drone_b:${IP_SETOR_1}:3001,drone_c:${IP_SETOR_2}:3002,drone_d:${IP_SETOR_2}:3002,drone_e:${IP_SETOR_3}:3003,drone_f:${IP_SETOR_3}:3003,drone_g:broker_setor_4:3004,drone_h:broker_setor_4:3004"
      ALL_BROKERS:       "${IP_SETOR_1}:3001,${IP_SETOR_2}:3002,${IP_SETOR_3}:3003,broker_setor_4:3004"
      REPLY_TIMEOUT:     "6.0"
      MISSION_MIN:       "20"
      MISSION_MAX:       "60"
      GETH_URL:          "http://geth_setor_4:8545"
      SETOR_WALLET_ADDR: "${SEALER_4_ADDR}"
      SETOR_WALLET_KEY:  "${SEALER_4_KEY}"
      CONTRACT_ADDR:     "${CONTRACT_ADDR}"
    depends_on:
      - broker_4
      - geth_setor_4
    restart: unless-stopped

  # ===========================================================================
  # DRONES
  # ===========================================================================

  drone_a:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_a
    environment:
      DRONE_ID:     "drone_a"
      BROKER_HOST:  "broker_setor_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    depends_on: [broker_1]
    restart: unless-stopped

  drone_b:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_b
    environment:
      DRONE_ID:     "drone_b"
      BROKER_HOST:  "broker_setor_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    depends_on: [broker_1]
    restart: unless-stopped

  drone_c:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_c
    environment:
      DRONE_ID:     "drone_c"
      BROKER_HOST:  "broker_setor_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    depends_on: [broker_2]
    restart: unless-stopped

  drone_d:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_d
    environment:
      DRONE_ID:     "drone_d"
      BROKER_HOST:  "broker_setor_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    depends_on: [broker_2]
    restart: unless-stopped

  drone_e:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_e
    environment:
      DRONE_ID:     "drone_e"
      BROKER_HOST:  "broker_setor_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    depends_on: [broker_3]
    restart: unless-stopped

  drone_f:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_f
    environment:
      DRONE_ID:     "drone_f"
      BROKER_HOST:  "broker_setor_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    depends_on: [broker_3]
    restart: unless-stopped

  drone_g:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_g
    environment:
      DRONE_ID:     "drone_g"
      BROKER_HOST:  "broker_setor_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    depends_on: [broker_4]
    restart: unless-stopped

  drone_h:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_h
    environment:
      DRONE_ID:     "drone_h"
      BROKER_HOST:  "broker_setor_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    depends_on: [broker_4]
    restart: unless-stopped

  # ===========================================================================
  # CLIENTES EMPRESA (terminais interativos com blockchain)
  # ===========================================================================

  empresa_a:
    build: ./client
    container_name: empresa_a
    environment:
      CLIENT_ID:     "empresa_a"
      BROKER_HOST:   "${IP_SETOR_1}"
      BROKER_PORT:   "3001"
      GETH_URL:      "http://${IP_SETOR_1}:18541"
      WALLET_ADDR:   "${EMPRESA_A_ADDR}"
      WALLET_KEY:    "${EMPRESA_A_KEY}"
      CONTRACT_ADDR: "${CONTRACT_ADDR}"
    stdin_open: true
    tty: true
    restart: "no"

  empresa_b:
    build: ./client
    container_name: empresa_b
    environment:
      CLIENT_ID:     "empresa_b"
      BROKER_HOST:   "${IP_SETOR_2}"
      BROKER_PORT:   "3002"
      GETH_URL:      "http://${IP_SETOR_2}:18542"
      WALLET_ADDR:   "${EMPRESA_B_ADDR}"
      WALLET_KEY:    "${EMPRESA_B_KEY}"
      CONTRACT_ADDR: "${CONTRACT_ADDR}"
    stdin_open: true
    tty: true
    restart: "no"

  # ===========================================================================
  # MONITOR TUI
  # ===========================================================================

  monitor:
    build: ./monitor
    container_name: monitor
    environment:
      BROKER_1_HOST: "broker_setor_1"
      BROKER_1_PORT: "3001"
      BROKER_2_HOST: "broker_setor_2"
      BROKER_2_PORT: "3002"
      BROKER_3_HOST: "broker_setor_3"
      BROKER_3_PORT: "3003"
      BROKER_4_HOST: "broker_setor_4"
      BROKER_4_PORT: "3004"
      TERM:          "xterm-256color"
    stdin_open: true
    tty: true
    restart: "no"

# ===========================================================================
# VOLUMES — persistência de dados dos nós geth
# ===========================================================================

volumes:
  geth_setor_1_data:
  geth_setor_2_data:
  geth_setor_3_data:
  geth_setor_4_data:
