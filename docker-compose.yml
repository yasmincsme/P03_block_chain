# Teste local (tudo numa máquina só):
#
#   docker compose up broker_1 broker_2 broker_3 broker_4 \
#                     sector_manager_1 sector_manager_2 sector_manager_3 sector_manager_4 \
#                     drone_a drone_b drone_c drone_d drone_e drone_f drone_g drone_h
#
#   docker compose run --rm -it client
#   docker compose run --rm -it monitor
#
# Para voltar à execução distribuída, trocar container names pelos IPs das máquinas.

services:

  # ===========================================================================
  # BROKERS
  # ===========================================================================

  broker_1:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_1
    ports:
      - "3001:3001/tcp"
      - "3001:3001/udp"
    environment:
      BROKER_PORT: "3001"
    restart: unless-stopped

  broker_2:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_2
    ports:
      - "3002:3002/tcp"
      - "3002:3002/udp"
    environment:
      BROKER_PORT: "3002"
    restart: unless-stopped

  broker_3:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_3
    ports:
      - "3003:3003/tcp"
      - "3003:3003/udp"
    environment:
      BROKER_PORT: "3003"
    restart: unless-stopped

  broker_4:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_4
    ports:
      - "3004:3004/tcp"
      - "3004:3004/udp"
    environment:
      BROKER_PORT: "3004"
    restart: unless-stopped

  # ===========================================================================
  # GERENCIADORES DE SETOR
  # ===========================================================================

  sector_manager_1:
    build: ./sector_manager
    container_name: setor_1_manager
    ports:
      - "5011:5001"
    environment:
      SECTOR_ID:     "1"
      LOCAL_BROKER:  "broker_setor_1"
      BROKER_PORT:   "3001"
      RA_PORT:       "5001"
      PEERS:         "setor_2_manager:5001,setor_3_manager:5001,setor_4_manager:5001"
      DRONES:        "drone_a:broker_setor_1:3001,drone_b:broker_setor_1:3001,drone_c:broker_setor_2:3002,drone_d:broker_setor_2:3002,drone_e:broker_setor_3:3003,drone_f:broker_setor_3:3003,drone_g:broker_setor_4:3004,drone_h:broker_setor_4:3004"
      ALL_BROKERS:   "broker_setor_1:3001,broker_setor_2:3002,broker_setor_3:3003,broker_setor_4:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    depends_on:
      - broker_1
    restart: unless-stopped

  sector_manager_2:
    build: ./sector_manager
    container_name: setor_2_manager
    ports:
      - "5012:5001"
    environment:
      SECTOR_ID:     "2"
      LOCAL_BROKER:  "broker_setor_2"
      BROKER_PORT:   "3002"
      RA_PORT:       "5001"
      PEERS:         "setor_1_manager:5001,setor_3_manager:5001,setor_4_manager:5001"
      DRONES:        "drone_a:broker_setor_1:3001,drone_b:broker_setor_1:3001,drone_c:broker_setor_2:3002,drone_d:broker_setor_2:3002,drone_e:broker_setor_3:3003,drone_f:broker_setor_3:3003,drone_g:broker_setor_4:3004,drone_h:broker_setor_4:3004"
      ALL_BROKERS:   "broker_setor_1:3001,broker_setor_2:3002,broker_setor_3:3003,broker_setor_4:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    depends_on:
      - broker_2
    restart: unless-stopped

  sector_manager_3:
    build: ./sector_manager
    container_name: setor_3_manager
    ports:
      - "5013:5001"
    environment:
      SECTOR_ID:     "3"
      LOCAL_BROKER:  "broker_setor_3"
      BROKER_PORT:   "3003"
      RA_PORT:       "5001"
      PEERS:         "setor_1_manager:5001,setor_2_manager:5001,setor_4_manager:5001"
      DRONES:        "drone_a:broker_setor_1:3001,drone_b:broker_setor_1:3001,drone_c:broker_setor_2:3002,drone_d:broker_setor_2:3002,drone_e:broker_setor_3:3003,drone_f:broker_setor_3:3003,drone_g:broker_setor_4:3004,drone_h:broker_setor_4:3004"
      ALL_BROKERS:   "broker_setor_1:3001,broker_setor_2:3002,broker_setor_3:3003,broker_setor_4:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    depends_on:
      - broker_3
    restart: unless-stopped

  sector_manager_4:
    build: ./sector_manager
    container_name: setor_4_manager
    ports:
      - "5014:5001"
    environment:
      SECTOR_ID:     "4"
      LOCAL_BROKER:  "broker_setor_4"
      BROKER_PORT:   "3004"
      RA_PORT:       "5001"
      PEERS:         "setor_1_manager:5001,setor_2_manager:5001,setor_3_manager:5001"
      DRONES:        "drone_a:broker_setor_1:3001,drone_b:broker_setor_1:3001,drone_c:broker_setor_2:3002,drone_d:broker_setor_2:3002,drone_e:broker_setor_3:3003,drone_f:broker_setor_3:3003,drone_g:broker_setor_4:3004,drone_h:broker_setor_4:3004"
      ALL_BROKERS:   "broker_setor_1:3001,broker_setor_2:3002,broker_setor_3:3003,broker_setor_4:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    depends_on:
      - broker_4
    restart: unless-stopped

  # ===========================================================================
  # DRONES
  # ===========================================================================

  drone_a:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_a
    environment:
      DRONE_ID:     "drone_a"
      BROKER_HOST:  "broker_setor_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_1
    restart: unless-stopped

  drone_b:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_b
    environment:
      DRONE_ID:     "drone_b"
      BROKER_HOST:  "broker_setor_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_1
    restart: unless-stopped

  drone_c:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_c
    environment:
      DRONE_ID:     "drone_c"
      BROKER_HOST:  "broker_setor_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_2
    restart: unless-stopped

  drone_d:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_d
    environment:
      DRONE_ID:     "drone_d"
      BROKER_HOST:  "broker_setor_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_2
    restart: unless-stopped

  drone_e:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_e
    environment:
      DRONE_ID:     "drone_e"
      BROKER_HOST:  "broker_setor_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_3
    restart: unless-stopped

  drone_f:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_f
    environment:
      DRONE_ID:     "drone_f"
      BROKER_HOST:  "broker_setor_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_3
    restart: unless-stopped

  drone_g:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_g
    environment:
      DRONE_ID:     "drone_g"
      BROKER_HOST:  "broker_setor_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_4
    restart: unless-stopped

  drone_h:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_h
    environment:
      DRONE_ID:     "drone_h"
      BROKER_HOST:  "broker_setor_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    depends_on:
      - broker_4
    restart: unless-stopped

  # ===========================================================================
  # MONITOR TUI
  # ===========================================================================

  monitor:
    build: ./monitor
    container_name: monitor
    environment:
      BROKER_1_HOST: "broker_setor_1"
      BROKER_1_PORT: "3001"
      BROKER_2_HOST: "broker_setor_2"
      BROKER_2_PORT: "3002"
      BROKER_3_HOST: "broker_setor_3"
      BROKER_3_PORT: "3003"
      BROKER_4_HOST: "broker_setor_4"
      BROKER_4_PORT: "3004"
      TERM:          "xterm-256color"
    stdin_open: true
    tty: true
    restart: "no"

  # ===========================================================================
  # CLIENTE — terminal interativo para solicitar despacho de drones
  # ===========================================================================

  client:
    build: ./client
    container_name: client
    environment:
      BROKER_HOST: "broker_setor_1"
      BROKER_PORT: "3001"
      CLIENT_ID:   "client_terminal"
    stdin_open: true
    tty: true
    restart: "no"
