# Execução distribuída — rodar apenas os serviços indicados em cada máquina:
#
#   qualquer  (1 vez só):      docker compose up ganache blockchain
#   ladica02  (172.16.201.2):  docker compose up sector_node_1 drone_a drone_b
#   ladica03  (172.16.201.1):  docker compose up sector_node_2 drone_c drone_d
#   ladica10  (172.16.201.10): docker compose up sector_node_3 drone_e drone_f
#   ladica11  (172.16.201.11): docker compose up sector_node_4 drone_g drone_h
#   ladica16  (172.16.201.16): docker compose run --rm -it monitor
#   qualquer  (acesso aos 4 nós): docker compose run --rm -it client
#
# Obs: ganache e blockchain podem rodar em qualquer máquina acessível a todos

services:

  # ===========================================================================
  # BLOCKCHAIN (Ganache + deployer)
  # ===========================================================================

  ganache:
    image: trufflesuite/ganache:latest
    container_name: ganache
    ports:
      - "8545:8545"
    command: >
      --mnemonic "test test test test test test test test test test test junk"
      --accounts 15
      --defaultBalanceEther 1000
      --host 0.0.0.0
      --port 8545
    restart: unless-stopped

  blockchain:
    build: ./blockchain
    container_name: blockchain_deployer
    environment:
      GANACHE_URL:    "http://ganache:8545"
      INITIAL_TOKENS: "500"
      NODE_1_HOST:    "sector_node_1"
      NODE_1_PORT:    "3001"
      NODE_2_HOST:    "sector_node_2"
      NODE_2_PORT:    "3002"
      NODE_3_HOST:    "sector_node_3"
      NODE_3_PORT:    "3003"
      NODE_4_HOST:    "sector_node_4"
      NODE_4_PORT:    "3004"
    depends_on:
      - ganache
      - sector_node_1
      - sector_node_2
      - sector_node_3
      - sector_node_4
    restart: "no"

  # ===========================================================================
  # NÓS DE SETOR (broker + gerenciador fundidos)
  # ===========================================================================

  sector_node_1:
    build: ./sector_node
    container_name: sector_node_1
    ports:
      - "3001:3001/tcp"
      - "3001:3001/udp"
      - "5001:5001"
    environment:
      SECTOR_ID:     "1"
      BROKER_PORT:   "3001"
      RA_PORT:       "5001"
      PEERS:         "sector_node_2:5001,sector_node_3:5001,sector_node_4:5001"
      DRONES:        "drone_a:sector_node_1:3001,drone_b:sector_node_1:3001,drone_c:sector_node_2:3002,drone_d:sector_node_2:3002,drone_e:sector_node_3:3003,drone_f:sector_node_3:3003,drone_g:sector_node_4:3004,drone_h:sector_node_4:3004"
      ALL_BROKERS:   "sector_node_1:3001,sector_node_2:3002,sector_node_3:3003,sector_node_4:3004"
      GANACHE_URL:   "http://ganache:8545"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    restart: unless-stopped

  sector_node_2:
    build: ./sector_node
    container_name: sector_node_2
    ports:
      - "3002:3002/tcp"
      - "3002:3002/udp"
      - "5002:5001"
    environment:
      SECTOR_ID:     "2"
      BROKER_PORT:   "3002"
      RA_PORT:       "5001"
      PEERS:         "sector_node_1:5001,sector_node_3:5001,sector_node_4:5001"
      DRONES:        "drone_a:sector_node_1:3001,drone_b:sector_node_1:3001,drone_c:sector_node_2:3002,drone_d:sector_node_2:3002,drone_e:sector_node_3:3003,drone_f:sector_node_3:3003,drone_g:sector_node_4:3004,drone_h:sector_node_4:3004"
      ALL_BROKERS:   "sector_node_1:3001,sector_node_2:3002,sector_node_3:3003,sector_node_4:3004"
      GANACHE_URL:   "http://ganache:8545"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    restart: unless-stopped

  sector_node_3:
    build: ./sector_node
    container_name: sector_node_3
    ports:
      - "3003:3003/tcp"
      - "3003:3003/udp"
      - "5003:5001"
    environment:
      SECTOR_ID:     "3"
      BROKER_PORT:   "3003"
      RA_PORT:       "5001"
      PEERS:         "sector_node_1:5001,sector_node_2:5001,sector_node_4:5001"
      DRONES:        "drone_a:sector_node_1:3001,drone_b:sector_node_1:3001,drone_c:sector_node_2:3002,drone_d:sector_node_2:3002,drone_e:sector_node_3:3003,drone_f:sector_node_3:3003,drone_g:sector_node_4:3004,drone_h:sector_node_4:3004"
      ALL_BROKERS:   "sector_node_1:3001,sector_node_2:3002,sector_node_3:3003,sector_node_4:3004"
      GANACHE_URL:   "http://ganache:8545"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    restart: unless-stopped

  sector_node_4:
    build: ./sector_node
    container_name: sector_node_4
    ports:
      - "3004:3004/tcp"
      - "3004:3004/udp"
      - "5004:5001"
    environment:
      SECTOR_ID:     "4"
      BROKER_PORT:   "3004"
      RA_PORT:       "5001"
      PEERS:         "sector_node_1:5001,sector_node_2:5001,sector_node_3:5001"
      DRONES:        "drone_a:sector_node_1:3001,drone_b:sector_node_1:3001,drone_c:sector_node_2:3002,drone_d:sector_node_2:3002,drone_e:sector_node_3:3003,drone_f:sector_node_3:3003,drone_g:sector_node_4:3004,drone_h:sector_node_4:3004"
      ALL_BROKERS:   "sector_node_1:3001,sector_node_2:3002,sector_node_3:3003,sector_node_4:3004"
      GANACHE_URL:   "http://ganache:8545"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
    restart: unless-stopped

  # ===========================================================================
  # DRONES
  # ===========================================================================

  drone_a:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_a
    environment:
      DRONE_ID:     "drone_a"
      BROKER_HOST:  "sector_node_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_b:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_b
    environment:
      DRONE_ID:     "drone_b"
      BROKER_HOST:  "sector_node_1"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_c:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_c
    environment:
      DRONE_ID:     "drone_c"
      BROKER_HOST:  "sector_node_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_d:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_d
    environment:
      DRONE_ID:     "drone_d"
      BROKER_HOST:  "sector_node_2"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_e:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_e
    environment:
      DRONE_ID:     "drone_e"
      BROKER_HOST:  "sector_node_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_f:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_f
    environment:
      DRONE_ID:     "drone_f"
      BROKER_HOST:  "sector_node_3"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_g:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_g
    environment:
      DRONE_ID:     "drone_g"
      BROKER_HOST:  "sector_node_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_h:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_h
    environment:
      DRONE_ID:     "drone_h"
      BROKER_HOST:  "sector_node_4"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  # ===========================================================================
  # CLIENTE INTERATIVO
  # Rodar com: docker compose run --rm -it client
  # ===========================================================================

  client:
    build: ./client
    container_name: drone_client
    environment:
      GANACHE_URL:   "http://ganache:8545"
      BROKER_1_HOST: "sector_node_1"
      BROKER_1_PORT: "3001"
      BROKER_2_HOST: "sector_node_2"
      BROKER_2_PORT: "3002"
      BROKER_3_HOST: "sector_node_3"
      BROKER_3_PORT: "3003"
      BROKER_4_HOST: "sector_node_4"
      BROKER_4_PORT: "3004"
    stdin_open: true
    tty: true
    restart: "no"

  # ===========================================================================
  # MONITOR TUI
  # Rodar com: docker compose run --rm -it monitor
  # ===========================================================================

  monitor:
    build: ./monitor
    container_name: monitor
    environment:
      BROKER_1_HOST: "sector_node_1"
      BROKER_1_PORT: "3001"
      BROKER_2_HOST: "sector_node_2"
      BROKER_2_PORT: "3002"
      BROKER_3_HOST: "sector_node_3"
      BROKER_3_PORT: "3003"
      BROKER_4_HOST: "sector_node_4"
      BROKER_4_PORT: "3004"
      TERM:          "xterm-256color"
    stdin_open: true
    tty: true
    restart: "no"
